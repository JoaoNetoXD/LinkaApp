<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0D0D12" />
  <meta name="description" content="Linka — fluxo real de compras, vendas e cupons para a instituição." />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Linka" />

  <title>Linka — Painel Operacional</title>

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" href="/icons/favicon.png" />
  <link rel="apple-touch-icon" href="/icons/favicon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body{margin:0;background:#0D0D12;color:#F0EEE8;font-family:'DM Sans',sans-serif}
    .boot-screen{min-height:100vh;display:grid;place-items:center;align-content:center;gap:18px;background:#0D0D12}
    .boot-logo{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;letter-spacing:-0.02em}.boot-logo span{color:#C8F135}
    .boot-loader{width:172px;height:4px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.08)}
    .boot-loader:after{content:'';display:block;width:42%;height:100%;border-radius:inherit;background:linear-gradient(90deg,transparent,#C8F135,transparent);animation:boot-loader .9s ease-in-out infinite}
    @keyframes boot-loader{from{transform:translateX(-100%)}to{transform:translateX(250%)}}
  </style>
</head>
<body>
  <div id="app">
    <div class="boot-screen" aria-label="Carregando Linka">
      <div class="boot-logo">Link<span>a</span></div>
      <div class="boot-loader"></div>
    </div>
  </div>
  <div id="modal-root"></div>
  <div id="toast-root" class="toast-container"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
