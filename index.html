<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0D0D12" />
  <meta name="description" content="Linka — fluxo real de compras, vendas e cupons para a instituição." />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Linka" />

  <title>Linka — Painel Operacional</title>

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
  <link rel="alternate icon" type="image/png" href="/icons/favicon.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body{margin:0;background:#0D0D12;color:#F0EEE8;font-family:'DM Sans',sans-serif}
    .boot-screen{min-height:100vh;display:grid;place-items:center;align-content:center;gap:16px;background:#0D0D12}
    .boot-logo{display:inline-flex;align-items:center;gap:10px;font-family:'DM Sans',sans-serif;font-size:1.9rem;font-weight:900;letter-spacing:-.02em;color:#F0EEE8}
    .boot-logo-mark{width:40px;height:40px;display:inline-grid;place-items:center;border-radius:14px;background:#C8F135}
    .boot-logo-mark svg{width:31px;height:31px}.boot-logo-mark rect{fill:#0D0D12;stroke:rgba(200,241,53,.34)}.boot-logo-mark path,.boot-logo-mark circle{fill:none;stroke:#C8F135;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
    .boot-loader{width:148px;height:3px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.08)}
    .boot-loader:after{content:'';display:block;width:42%;height:100%;border-radius:inherit;background:linear-gradient(90deg,transparent,#C8F135,transparent);animation:boot-loader .9s ease-in-out infinite}
    @keyframes boot-loader{from{transform:translateX(-100%)}to{transform:translateX(250%)}}
  </style>
</head>
<body>
  <div id="app">
    <div class="boot-screen" aria-label="Carregando Linka">
      <div class="boot-logo">
        <span class="boot-logo-mark" aria-hidden="true">
          <svg viewBox="0 0 42 42" role="img" focusable="false"><rect x="5" y="5" width="32" height="32" rx="12"/><path d="M15 14v14h12"/><path d="M26.5 14.5l-11 11"/><circle cx="15" cy="14" r="2.6"/><circle cx="27" cy="28" r="2.6"/></svg>
        </span>
        Linka
      </div>
      <div class="boot-loader"></div>
    </div>
  </div>
  <div id="modal-root"></div>
  <div id="toast-root" class="toast-container"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
