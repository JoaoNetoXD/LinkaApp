<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0A0A0F" />
  <meta name="description" content="Linka — fluxo real de compras, vendas e cupons para a instituição." />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Linka" />

  <title>Linka — Painel Operacional</title>

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" href="/icons/favicon.png" />
  <link rel="apple-touch-icon" href="/icons/favicon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body{margin:0;background:#080910;color:#f7f8fb;font-family:'Plus Jakarta Sans',system-ui,sans-serif}
    .boot-screen{min-height:100vh;display:grid;place-items:center;align-content:center;gap:18px;background:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.014) 1px,transparent 1px),#080910;background-size:36px 36px,36px 36px,auto}
    .boot-logo{font-size:2rem;font-weight:800}.boot-logo span{color:#22e6a8}
    .boot-loader{width:172px;height:4px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.08)}
    .boot-loader:after{content:'';display:block;width:42%;height:100%;border-radius:inherit;background:linear-gradient(90deg,transparent,#22e6a8,transparent);animation:boot-loader .9s ease-in-out infinite}
    @keyframes boot-loader{from{transform:translateX(-100%)}to{transform:translateX(250%)}}
  </style>
</head>
<body>
  <div id="app">
    <div class="boot-screen" aria-label="Carregando Linka">
      <div class="boot-logo">Link<span>a</span></div>
      <div class="boot-loader"></div>
    </div>
  </div>
  <div id="modal-root"></div>
  <div id="toast-root"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
